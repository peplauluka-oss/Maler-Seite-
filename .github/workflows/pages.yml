name: Deploy to GitHub Pages

# Eigenständiges Deployment NUR der Maler-Seite in ihr eigenes Repository.
# Der Pages-Unterpfad wird automatisch aus dem Repo-Namen abgeleitet
# (next.config.mjs liest GITHUB_REPOSITORY), z. B. …github.io/Maler-Seite-/.
# Triggert auf `main` – im Physio-Repo (anderer Branch) bleibt der Workflow
# damit inaktiv und kann die Physio-Seite nicht mehr überschreiben.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - name: Jekyll deaktivieren
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
