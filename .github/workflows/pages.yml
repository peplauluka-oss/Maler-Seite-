name: Deploy to GitHub Pages

# Kombiniertes Deployment in EIN Pages-Artefakt:
#   Maler-Seite  → Wurzel   …/Physio-Websiten/           (Standardziel)
#   Physio-Seite → Unterpfad …/Physio-Websiten/physio/
# So landet man beim „normalen" Aufruf immer auf der Maler-Seite; Physio
# bleibt unter /physio/ erreichbar.

on:
  push:
    branches:
      - claude/heusser-maler-berlin-relaunch-374x66
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ---- Maler-Seite (Wurzel /Physio-Websiten/) ----
      - name: Checkout Maler-Branch
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Maler-Abhängigkeiten
        run: npm ci
      - name: Maler-Seite bauen (Wurzel)
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - name: Maler-Output an die Wurzel
        run: |
          mkdir -p combined
          cp -r out/. combined/
          rm -rf out .next

      # ---- Physio-Seite (Unterpfad /physio/) ----
      - name: Checkout Physio-Branch
        uses: actions/checkout@v4
        with:
          ref: claude/physio-websiten-init-lr1lnm
          path: physio-src
      - name: Physio auf Unterpfad umstellen & bauen
        working-directory: physio-src
        env:
          GITHUB_PAGES: "true"
        run: |
          sed -i 's#const repo = "Physio-Websiten";#const repo = "Physio-Websiten/physio";#' next.config.mjs
          npm ci
          npm run build
      - name: Physio-Output nach /physio
        run: |
          mkdir -p combined/physio
          cp -r physio-src/out/. combined/physio/
          touch combined/.nojekyll

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
